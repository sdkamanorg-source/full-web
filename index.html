<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeadlyMC Store</title>

<!-- LIBS -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/modal.css">

</head>
<body>

<!-- NAV -->
<header class="flex justify-between p-4 bg-black">
  <h1 class="logo">DeadlyMC</h1>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Welcome to DeadlyMC</h2>
  <p>Best Minecraft Server Store</p>
  <button onclick="scrollToSection('ranks')">Shop Now</button>
</section>

<!-- RANKS -->
<section id="ranks" class="section">
  <h2>Ranks</h2>

  <div class="card-container">
    <div class="card"><h3>Eternal</h3><p>₹149/month</p><button onclick="buy('Eternal')">Buy</button></div>
    <div class="card"><h3>Titan</h3><p>₹279/month</p><button onclick="buy('Titan')">Buy</button></div>
    <div class="card"><h3>Deadly</h3><p>₹379/month</p><button onclick="buy('Deadly')">Buy</button></div>
    <div class="card highlight"><h3>Deadly+</h3><p>₹699/month</p><button onclick="buy('Deadly+')">Buy</button></div>
  </div>
</section>

<!-- KEYS -->
<section id="keys" class="section">
  <h2>Keys</h2>

  <div class="card-container">
    <div class="card"><h3>Epic Key x4</h3><p>₹39</p><button onclick="buy('Epic Key')">Buy</button></div>
    <div class="card"><h3>Muffin Key x4</h3><p>₹49</p><button onclick="buy('Muffin Key')">Buy</button></div>
    <div class="card"><h3>Cosmic Key x4</h3><p>₹69</p><button onclick="buy('Cosmic Key')">Buy</button></div>
    <div class="card"><h3>Crimson Key x4</h3><p>₹119</p><button onclick="buy('Crimson Key')">Buy</button></div>
  </div>
</section>

<!-- PAYMENT -->
<section class="section text-center">
  <h2>💳 Pay</h2>

  <img src="assets/payment-qr.png" class="qr" alt="QR">

  <br><br>

  <button onclick="paymentDone()" class="px-4 py-2 bg-green-600">
    I Have Paid
  </button>

  <p id="payment-msg" style="margin-top:10px;"></p>

  <br><br>

  <!-- DISCORD -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    
    <img src="https://img.freepik.com/premium-psd/social-media-day-png-highquality-transparent-icons-popular-apps_1093584-372.jpg"
         width="60"
         style="cursor:pointer;"
         onclick="openDiscord()">

    <p>Join Discord</p>

  </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modal-title"></h3>
    <button onclick="payNow()">Proceed Payment</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- JS -->
<script src="js/main.js"></script>

<!-- 🔥 FIXED JS (IMPORTANT) -->
<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}

function buy(item) {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal-title").innerText = item;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

function payNow() {
  alert("Redirecting to payment...");
}

function paymentDone() {
  document.getElementById("payment-msg").innerText =
    "✅ Payment done! Make ticket in Discord.";
}

function openDiscord() {
  window.open("https://discord.gg/HDpkv4N4", "_blank");
}
</script>

</body>
</html>
