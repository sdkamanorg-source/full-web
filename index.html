<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeadlyMC Store</title>

<!-- LIBS -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- CUSTOM CSS -->
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/modal.css">

<style>
/* 🔥 FORCE HERO BACKGROUND FIX */
.hero {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
              url('https://w.wallhaven.cc/full/7j/wallhaven-7jwrp3.jpg') center/cover no-repeat;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<header class="flex justify-between p-4 bg-black">
  <h1 class="logo">DeadlyMC</h1>
  <button id="menu-btn">☰</button>
</header>

<!-- HERO -->
<section class="hero text-center">
  <h2 class="text-5xl">Welcome to DeadlyMC</h2>
  <p>Best Minecraft Server Store</p>
  <button onclick="scrollToSection('ranks')" class="mt-4 px-6 py-2 bg-red-600">Shop Now</button>
</section>

<!-- RANKS -->
<section id="ranks" class="section">
  <h2>Ranks</h2>
  <div class="card-container">

    <div class="card">
      <h3>Eternal</h3>
      <p>₹149</p>
      <button onclick="buy('Eternal')">Buy</button>
    </div>

    <div class="card">
      <h3>Titan</h3>
      <p>₹279</p>
      <button onclick="buy('Titan')">Buy</button>
    </div>

    <div class="card">
      <h3>Deadly</h3>
      <p>₹379</p>
      <button onclick="buy('Deadly')">Buy</button>
    </div>

    <div class="card highlight">
      <h3>Deadly+</h3>
      <p>₹699</p>
      <button onclick="buy('Deadly+')">Buy</button>
    </div>

  </div>
</section>

<!-- KEYS -->
<section id="keys" class="section">
  <h2>Keys</h2>
  <div class="card-container">

    <div class="card">
      <h3>Epic Key</h3>
      <p>₹39</p>
      <button onclick="buy('Epic Key')">Buy</button>
    </div>

    <div class="card">
      <h3>Muffin Key</h3>
      <p>₹49</p>
      <button onclick="buy('Muffin Key')">Buy</button>
    </div>

    <div class="card">
      <h3>Cosmic Key</h3>
      <p>₹69</p>
      <button onclick="buy('Cosmic Key')">Buy</button>
    </div>

    <div class="card">
      <h3>Crimson Key</h3>
      <p>₹119</p>
      <button onclick="buy('Crimson Key')">Buy</button>
    </div>

  </div>
</section>

<!-- 💳 PAYMENT QR SECTION -->
<section class="section">
  <h2>💳 Scan & Pay</h2>

  <!-- 👇 QR IMAGE (PUT YOUR IMAGE IN assets folder) -->
  <img src="assets/payment-qr.png" width="200">

  <br><br>

  <button onclick="paymentDone()">I Have Paid</button>

  <p id="payment-msg"></p>

  <!-- DISCORD ICON -->
  <br><br>
  <img src="https://img.freepik.com/premium-psd/social-media-day-png-highquality-transparent-icons-popular-apps_1093584-372.jpg"
       width="60"
       style="cursor:pointer;"
       onclick="openDiscord()">

  <p>Click icon to join Discord</p>
</section>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modal-title"></h3>
    <button onclick="payNow()">Proceed Payment</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/checkout.js"></script>
<script src="js/responsive.js"></script>

<script>
function paymentDone() {
  document.getElementById("payment-msg").innerText =
    "✅ Your payment is done! Make ticket in Discord.";
}

function openDiscord() {
  window.open("https://discord.gg/UBP4c7WyJ", "_blank");
}
</script>

</body>
</html>
